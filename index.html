<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athen Bau</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;600&display=swap');
        
        body { margin: 0; background-color: #1a1a1a; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; }
        
        /* Der Rahmen, der die Seite wie ein Handy hält */
        .wrapper { 
            width: 100%; max-width: 420px; 
            background-color: #262626; 
            min-height: 100vh; display: flex; flex-direction: column; 
        }
        
        /* Header & Kontakt */
        .header { padding: 15px 20px; display: flex; justify-content: flex-end; }
        .kontakt-btn { 
            background: linear-gradient(to right, #b89356, #dec18a); 
            color: white; border: none; padding: 7px 15px; 
            text-decoration: none; font-size: 11px; font-weight: bold; border-radius: 2px;
        }

        /* Branding: Logo GROSS & Schrift */
        .branding { text-align: center; padding-bottom: 20px; }
        .logo { width: 180px; height: auto; margin-bottom: 0px; } /* Logo deutlich vergrößert */
        h1 { font-family: 'Cinzel', serif; font-size: 38px; color: #dec18a; margin: -10px 0 5px 0; }
        .slogan-box { border-bottom: 1px solid #dec18a; display: inline-block; padding-bottom: 3px; margin-bottom: 20px; }
        .slogan { font-size: 13px; color: #dec18a; }

        /* Weißer Bereich: Jetzt kompakter */
        .white-zone { background: white; padding: 20px 15px 40px 15px; text-align: center; }
        .title { font-family: 'Cinzel', serif; font-size: 18px; text-decoration: underline; color: #333; margin-bottom: 5px; }
        .arrows { display: grid; grid-template-columns: 1fr 1fr 1fr; color: #dec18a; font-size: 18px; margin-bottom: 10px; }

        /* Projekt Raster */
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .btn { background: #2b2b2b; color: #dec18a; padding: 18px 2px; text-decoration: none; font-size: 9px; font-weight: bold; display: flex; align-items: center; justify-content: center; min-height: 45px; }

        /* Goldener Footer */
        .footer { 
            background: linear-gradient(180deg, #b89356, #8e6d35); 
            display: grid; grid-template-columns: 1fr 1fr 1fr; 
            padding: 12px 5px; color: white; text-align: center; font-size: 8px;
            margin-top: auto; 
        }
        .footer-icon { font-size: 20px; margin-bottom: 3px; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="header">
            <a href="tel:+49123456789" class="kontakt-btn">📞 KONTAKT</a>
        </div>
        
        <div class="branding">
            <img src="Athen_Bau_logo-Transparent.png" alt="Athen Bau" class="logo">
            <h1>ATHEN Bau</h1>
            <div class="slogan-box">
                <span class="slogan">Präzision, Qualität, Zuverlässigkeit</span>
            </div>
        </div>

        <div class="white-zone">
            <div class="title">Projekte schauen</div>
            <div class="arrows"><span>↓</span><span>↓</span><span>↓</span></div>
            
            <div class="grid">
                <a href="#" class="btn">Badezimmer</a>
                <a href="#" class="btn">Küche</a>
                <a href="#" class="btn">Wände & Decken</a>
                <a href="#" class="btn">Bodenbeläge</a>
                <a href="#" class="btn">Fassade</a>
                <a href="#" class="btn">Fliesen</a>
            </div>
        </div>

        <div class="footer">
            <div><div class="footer-icon">⚖️</div>Festpreisgarantie</div>
            <div><div class="footer-icon">📅</div>Termintreue</div>
            <div><div class="footer-icon">🏆</div>Meisterbetrieb</div>
        </div>
    </div>
</body>
</html>
