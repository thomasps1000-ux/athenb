<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athen Bau</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;600&display=swap');
        body { margin: 0; background-color: #262626; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; }
        .wrapper { width: 100%; max-width: 450px; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* Goldene Elemente */
        .gold-text { color: #dec18a; }
        .gold-bg { background: linear-gradient(to right, #b89356, #dec18a); }

        /* Header */
        .header { padding: 20px; display: flex; justify-content: flex-end; }
        .kontakt { color: white; border: 1px solid #dec18a; padding: 5px 10px; text-decoration: none; font-size: 12px; font-weight: bold; }

        /* Logo Bereich */
        .branding { text-align: center; padding-bottom: 30px; }
        .logo { width: 130px; height: auto; }
        h1 { font-family: 'Cinzel', serif; font-size: 36px; margin: 5px 0; color: #dec18a; }
        .slogan-box { border-bottom: 1px solid #dec18a; display: inline-block; padding-bottom: 5px; }
        .slogan { font-size: 13px; color: #dec18a; }

        /* Weißer Bereich */
        .white-zone { background: white; flex-grow: 1; padding: 25px 15px; text-align: center; }
        .title { font-family: 'Cinzel', serif; font-size: 18px; text-decoration: underline; margin-bottom: 5px; }
        .arrows { display: grid; grid-template-columns: 1fr 1fr 1fr; color: #dec18a; font-size: 20px; margin-bottom: 15px; }

        /* Buttons */
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .btn { background: #2b2b2b; color: #dec18a; padding: 20px 5px; text-decoration: none; font-size: 9px; font-weight: bold; }

        /* Footer */
        .footer { background: linear-gradient(180deg, #b89356, #8e6d35); display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 15px 5px; color: white; text-align: center; font-size: 8px; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="header"><a href="#" class="kontakt gold-bg">KONTAKT</a></div>
        
        <div class="branding">
            <img src="Athen_Bau_logo-Transparent.png" class="logo">
            <h1>ATHEN Bau</h1>
            <div class="slogan-box"><span class="slogan">Präzision, Qualität, Zuverlässigkeit</span></div>
        </div>

        <div class="white-zone">
            <div class="title">Projekte schauen</div>
            <div class="arrows"><span>↓</span><span>↓</span><span>↓</span></div>
            
            <div class="grid">
                <a href="#" class="btn">Badezimmer</a>
                <a href="#" class="btn">Küche</a>
                <a href="#" class="btn">Wände & Decken</a>
                <a href="#" class="btn">Bodenbeläge</a>
                <a href="#" class="btn">Fassade</a>
                <a href="#" class="btn">Fliesen</a>
            </div>
        </div>

        <div class="footer">
            <div><div style="font-size:20px">⚖️</div>Festpreisgarantie</div>
            <div><div style="font-size:20px">📅</div>Termintreue</div>
            <div><div style="font-size:20px">🏆</div>Meisterbetrieb</div>
        </div>
    </div>
</body>
</html>
