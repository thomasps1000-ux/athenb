<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athen Bau</title>
    <style>
        /* Grunddesign */
        body { 
            background-color: #2C2C2C; 
            color: #D4AF37; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Kontakt Button oben rechts */
        .header-nav {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            padding: 15px;
            box-sizing: border-box;
        }
        .kontakt-btn {
            border: 1px solid #D4AF37;
            color: #D4AF37;
            text-decoration: none;
            padding: 8px 15px;
            font-size: 13px;
            font-weight: bold;
        }

        /* Logo Bereich oben Mitte */
        .brand-area {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 40px;
        }
        h1 { 
            font-size: 38px; 
            font-weight: bold; 
            margin: 0; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .slogan { 
            font-size: 14px; 
            font-weight: normal; /* Nicht fett laut Vorgabe */
            margin-top: 8px;
            letter-spacing: 1px;
        }

        /* 6 Projekt-Buttons im Raster */
        .project-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 Spalten */
            gap: 15px;
            width: 90%;
            max-width: 400px;
            padding-bottom: 50px;
        }
        .project-btn {
            border: 1px solid #D4AF37;
            color: #D4AF37;
            text-decoration: none;
            padding: 35px 10px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            background: transparent;
        }
    </style>
</head>
<body>

    <div class="header-nav">
        <a href="tel:+491761234567" class="kontakt-btn">KONTAKT</a>
    </div>

    <div class="brand-area">
        <h1>ATHEN Bau</h1>
        <div class="slogan">Präzision, Qualität, Zuverlässigkeit</div>
    </div>

    <div class="project-grid">
        <a href="#" class="project-btn">Badezimmer</a>
        <a href="#" class="project-btn">Küche</a>
        <a href="#" class="project-btn">Wände</a>
        <a href="#" class="project-btn">Böden</a>
        <a href="#" class="project-btn">Fassade</a>
        <a href="#" class="project-btn">Fliesen</a>
    </div>

</body>
</html>
